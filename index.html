<!doctype html>
<html lang="en" dir="auto" class="light">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="title" content="Automate Your Trades | Zullufx" />
        <meta
            name="description"
            content="Professional automated trading platform for derivatives. Build, test, and deploy advanced trading bots with Zullufx."
        />
        <meta property="og:title" content="Zullufx" />
        <meta
            property="og:description"
            content="Professional automated trading platform for derivatives. Build, test, and deploy advanced trading bots with Zullufx."
        />
        <title>Automate Your Trades | Zullufx</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                font-size: 62.5%;
                --meso-purple: #ff003c; /* Cyber neon red */
                --meso-violet: #880015; /* Deep cyber dark red */
                --meso-pink: #ff2200; /* Neon orange-red */
                --meso-indigo: #ff3366; /* Neon pink-red */
                --meso-glow: rgba(255, 0, 60, 0.45); /* High-tech red glow */
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                padding: 0;
                background: #050510;
                font-family: 'Outfit', sans-serif;
                overflow: hidden;
            }

            /* ── Splash Screen ── */
            #splash-screen {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #050510;
                z-index: 9999;
                transition:
                    opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #splash-screen.hidden {
                opacity: 0;
                transform: scale(1.04);
                pointer-events: none;
            }

            /* ── Cosmic Background ── */
            .splash-bg {
                position: absolute;
                inset: 0;
                overflow: hidden;
            }
            .splash-bg__nebula {
                position: absolute;
                border-radius: 50%;
                filter: blur(100px);
                animation: nebula-drift 18s ease-in-out infinite alternate;
            }
            .splash-bg__nebula--1 {
                width: 700px;
                height: 700px;
                background: radial-gradient(circle, rgba(255, 0, 60, 0.35) 0%, transparent 70%);
                top: -200px;
                left: -150px;
                animation-delay: 0s;
            }
            .splash-bg__nebula--2 {
                width: 500px;
                height: 500px;
                background: radial-gradient(circle, rgba(153, 0, 36, 0.25) 0%, transparent 70%);
                bottom: -100px;
                right: -100px;
                animation-delay: -6s;
            }
            .splash-bg__nebula--3 {
                width: 400px;
                height: 400px;
                background: radial-gradient(circle, rgba(255, 34, 0, 0.3) 0%, transparent 70%);
                top: 40%;
                left: 35%;
                animation-delay: -12s;
            }
            .splash-bg__grid {
                position: absolute;
                inset: 0;
                background-image:
                    linear-gradient(rgba(255, 0, 60, 0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 0, 60, 0.04) 1px, transparent 1px);
                background-size: 60px 60px;
                mask-image: radial-gradient(ellipse 80% 80% at center, black, transparent);
            }
            /* Floating particles */
            .splash-bg__particles {
                position: absolute;
                inset: 0;
            }
            .particle {
                position: absolute;
                width: 3px;
                height: 3px;
                background: var(--meso-purple);
                border-radius: 50%;
                box-shadow: 0 0 6px var(--meso-purple);
                animation: particle-float linear infinite;
                opacity: 0;
            }

            /* ── Main Card ── */
            .splash-card {
                position: relative;
                z-index: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
                padding: 52px 56px 44px;
                width: min(440px, 90vw);
                background: linear-gradient(145deg, rgba(18, 10, 40, 0.9) 0%, rgba(10, 8, 30, 0.95) 100%);
                border: 1px solid rgba(255, 0, 60, 0.2);
                border-radius: 32px;
                backdrop-filter: blur(30px);
                box-shadow:
                    0 0 0 1px rgba(255, 0, 60, 0.1),
                    0 40px 80px -20px rgba(0, 0, 0, 0.8),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
                animation: card-rise 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            }
            /* Animated border glow */
            .splash-card::before {
                content: '';
                position: absolute;
                inset: -1px;
                border-radius: 33px;
                background: linear-gradient(
                    135deg,
                    var(--meso-purple),
                    var(--meso-pink),
                    var(--meso-indigo),
                    var(--meso-purple)
                );
                background-size: 300% 300%;
                animation: border-rotate 4s linear infinite;
                -webkit-mask:
                    linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
                mask:
                    linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                padding: 1px;
                opacity: 0.6;
            }

            /* ── Logo Mark ── */
            .splash-logo-area {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 32px;
            }
            .splash-logo-ring-wrap {
                position: relative;
                width: 96px;
                height: 96px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 24px;
            }
            .splash-logo-ring {
                position: absolute;
                inset: 0;
                border-radius: 50%; /* Pure circular for realistic radar look */
                border: 2px solid transparent;
                background: linear-gradient(135deg, var(--meso-purple), var(--meso-pink)) border-box;
                -webkit-mask:
                    linear-gradient(#fff 0 0) padding-box,
                    linear-gradient(#fff 0 0);
                mask:
                    linear-gradient(#fff 0 0) padding-box,
                    linear-gradient(#fff 0 0);
                -webkit-mask-composite: xor;
                mask-composite: exclude;
                animation: spin-ring 8s linear infinite;
            }
            .splash-logo-ring--outer {
                inset: -14px;
                border-radius: 50%; /* Pure circular */
                border: 1px solid transparent;
                background: linear-gradient(225deg, var(--meso-indigo), var(--meso-pink)) border-box;
                animation: spin-ring 12s linear infinite reverse;
                opacity: 0.4;
            }
            .splash-logo-mark {
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, var(--meso-purple) 0%, var(--meso-pink) 100%);
                border-radius: 50%; /* Round scanner core */
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow:
                    0 0 30px var(--meso-glow),
                    0 8px 24px rgba(0, 0, 0, 0.4);
                animation: logo-pulse 3s ease-in-out infinite;
                z-index: 2;
                overflow: hidden;
            }
            /* Holographic Radar Scanner styles */
            .holographic-radar {
                position: relative;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: rgba(10, 8, 30, 0.6);
                border: 1px solid rgba(255, 0, 60, 0.3);
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: inset 0 0 15px rgba(255, 0, 60, 0.2);
            }
            .radar-grid {
                position: absolute;
                inset: 0;
                background-image: 
                    radial-gradient(circle, transparent 30%, rgba(255, 0, 60, 0.15) 31%, rgba(255, 0, 60, 0.15) 32%, transparent 33%),
                    radial-gradient(circle, transparent 60%, rgba(255, 0, 60, 0.1) 61%, rgba(255, 0, 60, 0.1) 62%, transparent 63%),
                    linear-gradient(rgba(255, 0, 60, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 0, 60, 0.05) 1px, transparent 1px);
                background-size: 100% 100%, 100% 100%, 10px 10px, 10px 10px;
                background-position: center;
            }
            .radar-sweep {
                position: absolute;
                inset: 0;
                background: conic-gradient(from 0deg, rgba(255, 0, 60, 0.4) 0deg, rgba(255, 0, 60, 0) 90deg);
                border-radius: 50%;
                animation: radar-spin 2s linear infinite;
                transform-origin: center;
                mix-blend-mode: screen;
            }
            .radar-dot {
                position: absolute;
                width: 4px;
                height: 4px;
                background: #ff003c;
                border-radius: 50%;
                box-shadow: 0 0 8px #ff003c, 0 0 12px #ff003c;
                animation: radar-flash 1.5s ease-out infinite;
            }
            .radar-dot--1 {
                top: 25%;
                left: 30%;
                animation-delay: 0.2s;
            }
            .radar-dot--2 {
                bottom: 30%;
                right: 25%;
                animation-delay: 0.8s;
            }
            .radar-brand-q {
                position: relative;
                z-index: 5;
                font-family: "Outfit", "Inter", sans-serif;
                font-size: 24px;
                font-weight: 900;
                color: #ffffff;
                text-shadow: 
                    0 0 10px rgba(255, 0, 60, 0.8),
                    0 0 20px rgba(255, 0, 60, 0.4);
                animation: text-float 3s ease-in-out infinite;
            }

            @keyframes radar-spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            @keyframes radar-flash {
                0%, 100% { opacity: 0; transform: scale(0.6); }
                50% { opacity: 1; transform: scale(1.2); }
            }
            @keyframes text-float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-3px); }
            }

            /* ── Brand Name ── */
            .splash-brand {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
            }
            .splash-brand__name {
                font-size: 38px;
                font-weight: 900;
                letter-spacing: 3px;
                line-height: 1;
                background: linear-gradient(135deg, #ffe0e5 0%, #ffc0cb 40%, #ff4d6d 80%, #ff003c 100%);
                background-size: 200% 200%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: shimmer-brand 4s ease-in-out infinite;
                margin: 0;
            }
            .splash-brand__tagline {
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 5px;
                text-transform: uppercase;
                color: rgba(255, 192, 203, 0.5);
                margin-top: 4px;
            }

            /* ── Status ── */
            .splash-status {
                width: 100%;
                margin-top: 28px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .splash-status__text {
                text-align: center;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: rgba(255, 192, 203, 0.4);
                animation: text-fade 2s ease-in-out infinite alternate;
            }

            /* ── Progress Bar ── */
            .splash-progress {
                position: relative;
                width: 100%;
                height: 4px;
                background: rgba(255, 255, 255, 0.04);
                border-radius: 100px;
                overflow: visible;
                margin-top: 6px;
            }
            .splash-progress__track {
                position: absolute;
                inset: 0;
                border-radius: 100px;
                overflow: hidden;
            }
            .splash-progress__fill {
                position: absolute;
                height: 100%;
                width: 0%;
                background: linear-gradient(
                    90deg,
                    var(--meso-purple),
                    #ff003c,
                    var(--meso-pink)
                );
                border-radius: 100px;
                transition: width 0.1s ease-out;
            }
            .splash-progress__glow {
                position: absolute;
                top: -4px;
                height: 12px;
                width: 0%;
                background: linear-gradient(90deg, var(--meso-purple), var(--meso-pink));
                border-radius: 100px;
                filter: blur(8px);
                opacity: 0.8;
                transition: width 0.1s ease-out;
            }
            /* Moving light dot on the bar */
            .splash-progress__dot {
                position: absolute;
                top: 50%;
                left: 0%;
                transform: translate(-50%, -50%);
                width: 10px;
                height: 10px;
                background: white;
                border-radius: 50%;
                box-shadow:
                    0 0 15px 5px var(--meso-purple),
                    0 0 25px 8px var(--meso-pink);
                transition: left 0.1s ease-out;
            }
            .splash-percent {
                font-size: 14px;
                font-weight: 900;
                color: white;
                text-align: center;
                margin-top: 4px;
                font-family: 'Outfit', sans-serif;
                letter-spacing: 1px;
                text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
            }

            /* ── Security Badge ── */
            .splash-badge {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 7px;
                color: rgba(148, 163, 184, 0.3);
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
            }
            .splash-badge__dot {
                width: 5px;
                height: 5px;
                background: #10b981;
                border-radius: 50%;
                box-shadow: 0 0 8px #10b981;
                animation: dot-pulse 2s infinite;
            }

            /* ── Footer tagline ── */
            .splash-footer {
                position: absolute;
                bottom: 32px;
                color: rgba(148, 163, 184, 0.2);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 4px;
                text-transform: uppercase;
                animation: fade-in 2s ease 1s both;
            }

            /* ═══════════ KEYFRAMES ═══════════ */
            @keyframes nebula-drift {
                0% {
                    transform: translate(0, 0) scale(1);
                }
                100% {
                    transform: translate(40px, 30px) scale(1.12);
                }
            }
            @keyframes card-rise {
                from {
                    opacity: 0;
                    transform: translateY(40px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            @keyframes border-rotate {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }
            @keyframes spin-ring {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes logo-pulse {
                0%,
                100% {
                    box-shadow:
                        0 0 30px var(--meso-glow),
                        0 8px 24px rgba(0, 0, 0, 0.4);
                    transform: scale(1);
                }
                50% {
                    box-shadow:
                        0 0 50px var(--meso-glow),
                        0 0 80px rgba(153, 0, 36, 0.3),
                        0 8px 24px rgba(0, 0, 0, 0.4);
                    transform: scale(1.05);
                }
            }
            @keyframes shimmer-brand {
                0%,
                100% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
            }
            @keyframes bar-slide {
                0% {
                    left: -50%;
                }
                100% {
                    left: 110%;
                }
            }
            @keyframes dot-slide {
                0% {
                    left: -50%;
                    opacity: 0;
                }
                10% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    left: 110%;
                    opacity: 0;
                }
            }
            @keyframes dot-pulse {
                0%,
                100% {
                    opacity: 1;
                    box-shadow: 0 0 8px #10b981;
                }
                50% {
                    opacity: 0.4;
                    box-shadow: 0 0 3px #10b981;
                }
            }
            @keyframes text-fade {
                from {
                    opacity: 0.3;
                }
                to {
                    opacity: 0.7;
                }
            }
            @keyframes fade-in {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes particle-float {
                0% {
                    transform: translateY(110vh) scale(0);
                    opacity: 0;
                }
                5% {
                    opacity: 1;
                }
                95% {
                    opacity: 1;
                }
                100% {
                    transform: translateY(-10vh) scale(1.5);
                    opacity: 0;
                }
            }
        </style>
    </head>

    <body class="body theme theme--light">
        <div id="splash-screen">
            <!-- Cosmic Background -->
            <div class="splash-bg">
                <div class="splash-bg__nebula splash-bg__nebula--1"></div>
                <div class="splash-bg__nebula splash-bg__nebula--2"></div>
                <div class="splash-bg__nebula splash-bg__nebula--3"></div>
                <div class="splash-bg__grid"></div>
                <div class="splash-bg__particles" id="particles"></div>
            </div>

            <!-- Main Card -->
            <div class="splash-card">
                <div class="splash-logo-area">
                    <!-- Ring + Logo -->
                    <div class="splash-logo-ring-wrap">
                        <div class="splash-logo-ring"></div>
                        <div class="splash-logo-ring splash-logo-ring--outer"></div>
                        <div class="splash-logo-mark">
                            <!-- High-end Holographic Zullufx "Z" Scanner -->
                            <div class="holographic-radar">
                                <div class="radar-sweep"></div>
                                <div class="radar-grid"></div>
                                <div class="radar-dot radar-dot--1"></div>
                                <div class="radar-dot radar-dot--2"></div>
                                <div class="radar-brand-q">Z</div>
                            </div>
                        </div>
                    </div>

                    <!-- Brand Name -->
                    <div class="splash-brand">
                        <h1 class="splash-brand__name">Zullufx</h1>
                        <span class="splash-brand__tagline">AI · Bot · Trading Hub</span>
                    </div>
                </div>

                <!-- Status & Progress -->
                <div class="splash-status">
                    <div class="splash-status__text" id="splash-status-text">Initializing trading engine...</div>

                    <div class="splash-progress">
                        <div class="splash-progress__track">
                            <div class="splash-progress__fill"></div>
                        </div>
                        <div class="splash-progress__glow"></div>
                        <div class="splash-progress__dot"></div>
                    </div>
                    <div class="splash-percent" id="splash-progress-percent">0%</div>

                    <div class="splash-badge">
                        <span class="splash-badge__dot"></span>
                        <span>SSL Secure Connection</span>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="splash-footer">Zullufx &copy; 2026</div>
        </div>

        <div id="modal_root" class="modal-root"></div>
        <div id="popup_root" class="popup-root"></div>
        <div id="root"></div>

        <script>
            // ── Particle generator ──
            (function () {
                var container = document.getElementById('particles');
                var colors = ['#ff003c', '#ff2200', '#ff3366', '#ff4d6d', '#990024'];
                for (var i = 0; i < 35; i++) {
                    var p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.width = p.style.height = Math.random() * 3 + 2 + 'px';
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.boxShadow = '0 0 6px ' + colors[Math.floor(Math.random() * colors.length)];
                    p.style.animationDuration = Math.random() * 10 + 8 + 's';
                    p.style.animationDelay = Math.random() * 10 + 's';
                    container.appendChild(p);
                }
            })();

            // ── Cycling status messages ──
            (function () {
                var messages = [
                    'Initializing trading engine...',
                    'Connecting to Deriv markets...',
                    'Loading strategy modules...',
                    'Calibrating AI signals...',
                    'Almost ready...',
                ];
                var el = document.getElementById('splash-status-text');
                var i = 0;
                var iv = setInterval(function () {
                    i = (i + 1) % messages.length;
                    el.style.opacity = '0';
                    setTimeout(function () {
                        el.textContent = messages[i];
                        el.style.opacity = '';
                    }, 300);
                }, 1400);
                window.__splashMsgInterval = iv;
            })();

            // ── Dynamic progression ──
            (function () {
                var progressFill = document.querySelector('.splash-progress__fill');
                var progressGlow = document.querySelector('.splash-progress__glow');
                var progressDot = document.querySelector('.splash-progress__dot');
                var percentText = document.getElementById('splash-progress-percent');
                
                var percentage = 0;
                var duration = 2400; // 2.4 seconds
                var intervalTime = 30; // ms
                var increment = 100 / (duration / intervalTime);
                
                var timer = setInterval(function () {
                    percentage += increment + Math.random() * 1.5;
                    if (percentage >= 100) {
                        percentage = 100;
                        clearInterval(timer);
                    }
                    var rounded = Math.floor(percentage);
                    if (percentText) percentText.textContent = rounded + '%';
                    if (progressFill) progressFill.style.width = rounded + '%';
                    if (progressGlow) progressGlow.style.width = rounded + '%';
                    if (progressDot) progressDot.style.left = rounded + '%';
                }, intervalTime);
                window.__splashProgressInterval = timer;
            })();

            // ── Hide splash screen once app is ready ──
            window.addEventListener('load', function () {
                setTimeout(function () {
                    clearInterval(window.__splashMsgInterval);
                    clearInterval(window.__splashProgressInterval);
                    
                    // Force complete progress elements
                    var progressFill = document.querySelector('.splash-progress__fill');
                    var progressGlow = document.querySelector('.splash-progress__glow');
                    var progressDot = document.querySelector('.splash-progress__dot');
                    var percentText = document.getElementById('splash-progress-percent');
                    if (percentText) percentText.textContent = '100%';
                    if (progressFill) progressFill.style.width = '100%';
                    if (progressGlow) progressGlow.style.width = '100%';
                    if (progressDot) progressDot.style.left = '100%';

                    var splash = document.getElementById('splash-screen');
                    if (splash) {
                        splash.classList.add('hidden');
                        setTimeout(function () {
                            splash.style.display = 'none';
                            document.body.style.overflow = '';
                        }, 900);
                    }
                }, 2500);
            });
        </script>
    </body>
</html>
